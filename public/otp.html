<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify OTP - Living Christ</title>
  <link rel="stylesheet" href="auth.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    .auth-success {
      background: rgba(0,180,100,0.10);
      border: 1px solid rgba(0,180,100,0.28);
      border-radius: var(--radius);
      color: #7CFFB2;
      font-family: var(--font-ui);
      font-size: 13px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: none;
      animation: fadeUp 0.3s ease;
    }
    .auth-success.show { display: block; }

    .resend-row {
      text-align: center;
      margin-top: 18px;
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--text-muted);
    }

    .resend-btn {
      background: none;
      border: none;
      color: var(--gold);
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      margin-left: 6px;
      text-decoration: underline;
      transition: color 0.2s;
    }

    .resend-btn:hover  { color: var(--gold-light); }
    .resend-btn:disabled { color: var(--text-muted); cursor: not-allowed; text-decoration: none; }

    .verse-strip {
      text-align: center;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border-light);
      font-family: var(--font-body);
      font-size: 13px;
      font-style: italic;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .verse-strip em {
      display: block;
      font-style: normal;
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold-dark);
      margin-top: 5px;
    }
  </style>
</head>

<body>
<span class="bg-cross left">✝</span>
<span class="bg-cross right">✝</span>
<canvas id="particles"></canvas>

<div class="auth-page">
  <div class="auth-card">

    <a href="signup.html" class="auth-back">← Back</a>

    <div class="auth-header">
      <a href="index.html" class="auth-logo">
        <span class="auth-cross">✝</span>
        <div class="auth-brand">
          <span class="auth-brand-main">Living Christ</span>
          <span class="auth-brand-sub">Global Outreach</span>
        </div>
      </a>
      <h1 class="auth-title">Verify OTP</h1>
      <p class="auth-subtitle">Enter the 6-digit code sent to your email</p>
    </div>

    <div class="auth-error"   id="authError"></div>
    <div class="auth-success" id="authSuccess"></div>

    <div class="otp-boxes">
      <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code">
      <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
    </div>

    <button class="btn-submit" id="verifyBtn">
      <span>✝ Verify</span>
    </button>

    <div class="resend-row">
      Didn't receive a code?
      <button class="resend-btn" id="resendBtn">Resend OTP</button>
    </div>

    <div class="verse-strip">
      <p>"The Lord is faithful to all his promises."</p>
      <em>Psalm 145:13</em>
    </div>

  </div>
</div>

<script src="config.js"></script>
<script src="api.js"></script>
<script src="otp.js"></script>
<script>
  /* ── OTP auto-advance & keyboard navigation ── */
  const inputs = document.querySelectorAll(".otp-digit");

  inputs.forEach((input, index) => {
    input.addEventListener("input", (e) => {
      // Allow only digits
      input.value = input.value.replace(/\D/g, "").slice(-1);
      if (input.value && index < inputs.length - 1) {
        inputs[index + 1].focus();
      }
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Backspace" && !input.value && index > 0) {
        inputs[index - 1].focus();
      }
      if (e.key === "ArrowLeft"  && index > 0)               inputs[index - 1].focus();
      if (e.key === "ArrowRight" && index < inputs.length-1) inputs[index + 1].focus();
    });

    /* Handle paste of full 6-digit code */
    input.addEventListener("paste", (e) => {
      const pasted = (e.clipboardData || window.clipboardData).getData("text").replace(/\D/g, "");
      if (pasted.length === 6) {
        e.preventDefault();
        inputs.forEach((inp, i) => inp.value = pasted[i] || "");
        inputs[5].focus();
      }
    });
  });

  /* ── Resend with cooldown ── */
  const resendBtn = document.getElementById("resendBtn");
  let cooldown = 0;
  let timer = null;

  function startCooldown(seconds) {
    cooldown = seconds;
    resendBtn.disabled = true;
    timer = setInterval(() => {
      cooldown--;
      resendBtn.textContent = `Resend in ${cooldown}s`;
      if (cooldown <= 0) {
        clearInterval(timer);
        resendBtn.disabled = false;
        resendBtn.textContent = "Resend OTP";
      }
    }, 1000);
  }

  resendBtn.addEventListener("click", async () => {
    const email = localStorage.getItem("email");
    if (!email) {
      showError("Email not found. Please sign up again.");
      return;
    }
    try {
      resendBtn.disabled = true;
      resendBtn.textContent = "Sending...";
      const res = await post("/auth/resend-otp", { email });
      showSuccess("A new OTP has been sent to your email.");
      startCooldown(60);
    } catch (err) {
      showError("Failed to resend OTP. Please try again.");
      resendBtn.disabled = false;
      resendBtn.textContent = "Resend OTP";
    }
  });

  function showError(msg) {
    const el = document.getElementById("authError");
    el.textContent = msg;
    el.classList.add("show");
    document.getElementById("authSuccess").classList.remove("show");
    setTimeout(() => el.classList.remove("show"), 4000);
  }

  function showSuccess(msg) {
    const el = document.getElementById("authSuccess");
    el.textContent = msg;
    el.classList.add("show");
    document.getElementById("authError").classList.remove("show");
    setTimeout(() => el.classList.remove("show"), 4000);
  }
</script>
</body>
</html>
